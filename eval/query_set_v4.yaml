# Text-VQL frozen query set v4 — EPIC-KITCHENS, 20 videos × ~5 queries.
#
# RULES:
#  - Once frozen: never delete, never renumber, never edit text/video. Only
#    `expected` and `notes` may be filled in after annotation. New queries go
#    in a NEW file (query_set_v5.yaml), never appended here.
#  - `expected` semantics: present | absent | unknown. `unknown` is the honest
#    default for videos we haven't watched. Upgrade to present/absent ONLY
#    after viewing debug_last_frame.jpg + the source video.
#  - `split` is fixed at creation time. dev = used for fitting presence
#    weights and tuning; test = held out, touched only for final paper numbers.
#  - `tags` are descriptive (filter knobs), not labels. Multi-tag is fine.
#
# DESIGN — rigor knobs deliberately turned up vs v4-draft1:
#  - ~70 distinct objects (was 18), spanning 8 kitchen categories so per-
#    category breakdowns are honest.
#  - 14 free-text descriptive queries (color, material, shape adjectives) so
#    the LLM parser is actually exercised, not just `noun`.
#  - Stress-test queries (wok, espresso machine, rice cooker on blind videos)
#    — likely absent in many kitchens, so they double as abstention candidates.
#  - Per-video shape: 1 common, 1 mid, 1 hard/uncommon, 1 free-text/descriptor,
#    1 wildcard. Forces the system to be tested across difficulty bands per
#    kitchen, not just averaged across them.
#
# CONFIRMED ANCHORS PRESERVED:
#  - P02_01 q006–q010: kettle, knife, pan, sponge, tap (prior debugged runs)
#  - P03_04 q011–q015: kettle, knife, pan, plate, tap (prior debugged runs)
#  - P04_01 q016–q022: kettle, pan, knife, cutting board, thermos (absent),
#                      chopsticks, rice cooker (heavily debugged + thermos
#                      false-positive case from 2026-06-13)

